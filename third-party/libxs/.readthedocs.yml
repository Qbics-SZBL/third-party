# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3"
  jobs:
    post_install:
      - pip install --no-deps "FORD>=7.0.6"

# Build documentation based on MkDocs
mkdocs:
  configuration: mkdocs.yml

# Dependencies (FORD installed via post_install with --no-deps
# to avoid markdown version conflict with mkslides)
python:
  install:
  - requirements: .theme/requirements.txt
